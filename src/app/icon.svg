<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle dark panel -->
  <circle cx="256" cy="256" r="230" fill="#020617" stroke="rgba(255,255,255,0.05)" stroke-width="4" />
  
  <!-- Outer orbital track -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#logoGlow)" stroke-width="6" stroke-dasharray="15 35" filter="url(#glowFilter)" opacity="0.8" />
  
  <!-- Inner cyber navigation grid -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(6, 182, 212, 0.15)" stroke-width="2" stroke-dasharray="4 8" />
  <line x1="256" y1="56" x2="256" y2="456" stroke="rgba(6, 182, 212, 0.1)" stroke-width="2" stroke-dasharray="6 6" />
  <line x1="56" y1="256" x2="456" y2="256" stroke="rgba(6, 182, 212, 0.1)" stroke-width="2" stroke-dasharray="6 6" />

  <!-- Supersonic delta aircraft vector -->
  <g transform="translate(256, 250) scale(1.3)" filter="url(#glowFilter)">
    <!-- Right wing -->
    <path d="M 0,-50 L 55,45 L 20,30 L 0,40 Z" fill="url(#logoGlow)" />
    <!-- Left wing -->
    <path d="M 0,-50 L -55,45 L -20,30 L 0,40 Z" fill="url(#logoGlow)" opacity="0.9" />
    <!-- Engine glow -->
    <ellipse cx="0" cy="38" rx="8" ry="3" fill="#ffffff" />
  </g>
</svg>
